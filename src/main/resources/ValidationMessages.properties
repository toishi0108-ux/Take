jakarta.validation.constraints.NotBlank.message={0}を入力してください。
jakarta.validation.constraints.NotNull.message={0}を入力してください。
jakarta.validation.constraints.Size.message={0}は{min}文字以上{max}文字以内で入力してください。
jakarta.validation.constraints.Max.message={0}は{value}までの整数値で入力してください。
jakarta.validation.constraints.Pattern.message={0}は半角英数字記号のみで入力してください。
