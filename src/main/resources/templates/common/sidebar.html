<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<body>
    <aside class="sidebar" th:fragment="sidebar-fragment">
        <h2 class="section-title">検索条件</h2>
        <form>
            <div class="form-group">
                <label>会社名</label>
                <input type="text" name="company_name">
            </div>
            <div class="form-group">
                <label>会社名（カナ）</label>
                <input type="text" name="company_kana">
            </div>
            <div class="form-group">
                <label>紹介会社電話番号</label>
                <input type="text" name="phone">
            </div>
            <div class="form-group">
                <label>備考</label>
                <input type="text" name="remarks">
            </div>
            <div class="form-group">
                <label class="group-label">担当地区</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="area" value="全国"> 全国</label>
                    <label><input type="checkbox" name="area" value="東京"> 東京</label>
                    <label><input type="checkbox" name="area" value="中部"> 中部</label>
                    <label><input type="checkbox" name="area" value="関西"> 関西</label>
                    <label><input type="checkbox" name="area" value="九州"> 九州</label>
                </div>
            </div>
            <div class="form-group">
                <label class="group-label">経験区分</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="experience" value="未経験"> 未経験採用</label>
                    <label><input type="checkbox" name="experience" value="経験者"> 経験者採用</label>
                </div>
            </div>
            <div class="search-actions">
                <button type="submit" class="btn btn-search">検索</button>
                <button type="reset" class="btn btn-reset">リセット</button>
            </div>
        </form>
    </aside>
</body>
</html>
